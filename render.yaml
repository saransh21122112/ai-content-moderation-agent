services:
  - type: web
    name: sentinel
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sentinel-redis
          property: connectionString
      - key: TRIAGE_MODEL
        value: gpt-4o-mini
      - key: ANALYSIS_MODEL
        value: gpt-4o
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_UPLOAD_BUCKET
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: moderation-decisions
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@sentinel.ai
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_USERNAME
        value: admin

databases:
  - name: sentinel-db
    plan: free
    databaseName: moderation_db
    user: moderation_user

  - name: sentinel-redis
    plan: free
