version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moderation_db
      POSTGRES_USER: moderation_user
      POSTGRES_PASSWORD: moderation_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./app/db/v2.sql:/docker-entrypoint-initdb.d/02-v2.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moderation_user -d moderation_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
